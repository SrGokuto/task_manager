<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión - Task Manager</title>
  <link rel="stylesheet" href="/css/auth.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <h1>📝 Task Manager</h1>
        <p>Gestor de Tareas</p>
      </div>

      <form id="loginForm" class="auth-form">
        <h2>Iniciar Sesión</h2>

        <div class="form-group">
          <label for="email">Email</label>
          <input 
            type="email" 
            id="email" 
            placeholder="tu@email.com" 
            required
          >
          <small id="emailError" class="error-message"></small>
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <input 
            type="password" 
            id="password" 
            placeholder="••••••••" 
            required
          >
          <small id="passwordError" class="error-message"></small>
        </div>

        <button type="submit" class="btn btn-primary btn-block">
          Iniciar Sesión
        </button>

        <small id="serverError" class="error-message" style="display: block; text-align: center; margin-top: 1rem;"></small>
      </form>

      <div class="auth-footer">
        <p>¿No tienes cuenta? <a href="/register">Regístrate aquí</a></p>
      </div>
    </div>
  </div>

  <script src="/js/utils.js"></script>
  <script src="/js/api.js"></script>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      try {
        const response = await apiCall('/api/auth/login', 'POST', {
          email,
          password
        });

        if (response.success) {
          localStorage.setItem('token', response.token);
          localStorage.setItem('user', JSON.stringify(response.user));
          showAlert('Iniciaste sesión correctamente', 'success');
          setTimeout(() => {
            window.location.href = '/';
          }, 1000);
        }
      } catch (error) {
        document.getElementById('serverError').textContent = error.message;
        document.getElementById('serverError').style.display = 'block';
      }
    });
  </script>
</body>
</html>
