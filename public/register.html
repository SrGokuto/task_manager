<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registrarse - Task Manager</title>
  <link rel="stylesheet" href="/css/auth.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <h1>📝 Task Manager</h1>
        <p>Gestor de Tareas</p>
      </div>

      <form id="registerForm" class="auth-form">
        <h2>Crear Cuenta</h2>

        <div class="form-group">
          <label for="name">Nombre Completo</label>
          <input 
            type="text" 
            id="name" 
            placeholder="Tu nombre" 
            required
          >
          <small id="nameError" class="error-message"></small>
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input 
            type="email" 
            id="email" 
            placeholder="tu@email.com" 
            required
          >
          <small id="emailError" class="error-message"></small>
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <input 
            type="password" 
            id="password" 
            placeholder="Mínimo 6 caracteres" 
            required
            minlength="6"
          >
          <small id="passwordError" class="error-message"></small>
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirmar Contraseña</label>
          <input 
            type="password" 
            id="confirmPassword" 
            placeholder="Confirma tu contraseña" 
            required
          >
          <small id="confirmPasswordError" class="error-message"></small>
        </div>

        <button type="submit" class="btn btn-primary btn-block">
          Crear Cuenta
        </button>

        <small id="serverError" class="error-message" style="display: block; text-align: center; margin-top: 1rem;"></small>
      </form>

      <div class="auth-footer">
        <p>¿Ya tienes cuenta? <a href="/login">Inicia sesión aquí</a></p>
      </div>
    </div>
  </div>

  <script src="/js/utils.js"></script>
  <script src="/js/api.js"></script>
  <script>
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      // Limpiar errores
      document.querySelectorAll('.error-message').forEach(el => el.textContent = '');

      // Validaciones
      let hasErrors = false;

      if (password !== confirmPassword) {
        document.getElementById('confirmPasswordError').textContent = 'Las contraseñas no coinciden';
        hasErrors = true;
      }

      if (hasErrors) return;

      try {
        const response = await apiCall('/api/auth/register', 'POST', {
          name,
          email,
          password
        });

        if (response.success) {
          localStorage.setItem('token', response.token);
          localStorage.setItem('user', JSON.stringify(response.user));
          showAlert('Cuenta creada correctamente', 'success');
          setTimeout(() => {
            window.location.href = '/';
          }, 1000);
        }
      } catch (error) {
        document.getElementById('serverError').textContent = error.message;
        document.getElementById('serverError').style.display = 'block';
      }
    });
  </script>
</body>
</html>
